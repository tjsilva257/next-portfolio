<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoger Lager</title>
    <link rel="stylesheet" href="/css/mystyle.css">
    <style media="screen, print">
        @font-face {
            font-family: "Bitstream Vera Serif Bold";
            src: url("C:\Fonts\arcadeclassic.regular.ttf");
        }

        body {
            font-family: "Bitstream Vera Serif Bold", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            /* Center text inside the container */
        }

        .headings h3,
        .credits h4,
        .message p {
            margin: 10px 0;
        }

        .controls button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Hoger of Lager</h1>
        </header>
        <main>
            <section class="headings">
                <h3 class="computer-header">Computer</h3>
                <h3 class="player-header">Speler</h3>
            </section>
            <section class="credits">
                <h4>Credits: <span class="computer-credits">0</span></h4>
                <h4>Credits: <span class="player-credits">0</span></h4>
            </section>
            <section class="dices">
                <div class="dices-computer-player">
                    <span class="dice computer-dice-one">&#9856;</span>
                    <span class="dice computer-dice-two">&#9857;</span>
                </div>
                <div class="dices-player">
                    <span class="dice player-dice-one">&#9858;</span>
                    <span class="dice player-dice-two">&#9859;</span>
                </div>
            </section>
            <section class="message">
                <div class="message-box">
                    <p>Druk op Go om het spel te starten.</p>
                </div>
            </section>
            <section class="controls">
                <button class="dice-button" onclick="rollPlayerDice()">
                    Gooi dobbelsteen
                </button>
                <button class="higher-button">Hoger</button>
                <button class="lower-button">Lager</button>
                <button class="go-button">GO</button>
                <!-- <div class="animeDice">
                    <img class="anime_spritesheet pixelart" src="img/six sided die.png" alt="dobbelsteen">
                </div> -->
            </section>
            <section>
                <div class="bg"></div>

                <div class="star-field">
                    <div class="layer"></div>
                    <div class="layer"></div>
                    <div class="layer"></div>
            </section>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script>
        // Functie om de naam van de speler te wijzigen
        function changePlayerHeader() {
            const newPlayerName = prompt("Voer de naam van de speler in:");
            const playerHeader = document.querySelector('.player-header');
            if (newPlayerName) {
                playerHeader.textContent = newPlayerName; // Wijzig de tekst naar de nieuwe naam
            }
        }

        // Roep de functie aan bij het laden van de pagina
        window.onload = changePlayerHeader;
    </script>
</body>

</html>
