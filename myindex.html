<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoger Lager</title>
    <link rel="stylesheet" href="/css/mystyle.css">
    <style media="screen, print">
        @font-face {
            font-family: "Bitstream Vera Serif Bold";
            src: url("C:\Fonts\arcadeclassic.regular.ttf");
        }

        body {
            font-family: "Bitstream Vera Serif Bold", serif;
            display: flex;
            /* Use Flexbox for centering */
            justify-content: center;
            /* Center horizontally */
            align-items: center;
            /* Center vertically */
            height: 100vh;
            /* Full height of the viewport */
            margin: 0;
            /* Remove default margin */
        }

        .container {
            text-align: center;
            /* Center text inside the container */
        }

        .headings h3,
        .credits h4,
        .message p {
            margin: 10px 0;
            /* Add some margin for spacing */
        }

        .controls button {
            margin: 5px;
            /* Add margin between buttons */
            padding: 10px 20px;
            /* Add padding to buttons */
            font-size: 16px;
            /* Increase font size */
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Hoger Lager</h1>
        </header>
        <main>
            <section class="headings">
                <h3>Computer</h3>
                <h3>Speler</h3>
            </section>
            <section class="credits">
                <h4>Credits: <span class="computer-credits">0</span></h4>
                <h4>Credits: <span class="player-credits">0</span></h4>
            </section>
            <section class="dices">
                <div class="dices-computer-player">
                    <span class="dice computer-dice-one">&#9856;</span>
                    <span class="dice computer-dice-two">&#9857;</span>
                </div>
                <div class="dices-player">
                    <span class="dice player-dice-one">&#9858;</span>
                    <span class="dice player-dice-two">&#9859;</span>
                </div>
            </section>
            <section class="message">
                <div class="message-box">
                    <p>Druk op Go om het spel te starten.</p>
                </div>
            </section>
            <section class="controls">
                <button class="dice-button" onclick="rollPlayerDice()">
                    Gooi dobbelsteen
                </button>
                <button class="higher-button">Hoger</button>
                <button class="lower-button">Lager</button>
                <button class="go-button">GO</button>
                <div class="animeDice">
                    <img class="anime_spritesheet pixelart" src="img/six sided die.png" alt="dobbelsteen">
                </div>
            </section>
            <section>
                <div class="bg"></div>

                <div class="star-field">
                    <div class="layer"></div>
                    <div class="layer"></div>
                    <div class="layer"></div>
            </section>
        </main>
    </div>

    <script src="/js/main.js"></script>
</body>

</html>
